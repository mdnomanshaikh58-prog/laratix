<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">Laratix Lab</title>
  <desc id="desc">Full Laratix Lab agency logo.</desc>
  <defs>
    <linearGradient id="xBlue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#19b7e6" />
      <stop offset="1" stop-color="#1562b8" />
    </linearGradient>
    <linearGradient id="xPurple" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#7a1d83" />
      <stop offset="1" stop-color="#b63faf" />
    </linearGradient>
    <linearGradient id="xOrange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f36b20" />
      <stop offset="1" stop-color="#ff9d18" />
    </linearGradient>
    <linearGradient id="lGreen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00c85a" />
      <stop offset="1" stop-color="#6bd75d" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="900" height="180" fill="none" />

  <g transform="translate(18 42)">
    <text
      x="0"
      y="94"
      fill="#050505"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-size="92"
