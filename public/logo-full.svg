    <g transform="translate(357 8) scale(0.92)" filter="url(#softShadow)">
      <path d="M0 24 L42 24 L84 82 L42 82 Z" fill="url(#xBlue)" />
      <path d="M88 78 L150 -18 L118 80 L88 78 Z" fill="url(#xPurple)" />
      <path d="M49 89 C57 78 60 67 49 52 L84 82 C74 95 64 104 44 110 Z" fill="#ffffff" opacity="0.96" />
      <path d="M44 110 L88 78 L151 128 L105 128 L75 93 L44 128 Z" fill="url(#xOrange)" />
      <path d="M0 128 L44 110 L75 93 C60 117 45 128 20 128 Z" fill="url(#xPurple)" />
      <path d="M42 24 L84 82 L118 80 L71 24 Z" fill="#1757ad" opacity="0.42" />
    </g>

    <g transform="translate(522 20)" filter="url(#softShadow)">
      <path d="M58 0 L152 0 L111 100 L17 100 Z" fill="#231b1d" />
      <path d="M105 70 L163 70 L136 100 L78 100 Z" fill="url(#lGreen)" />
      <path d="M116 70 L163 70 L136 100 L89 100 Z" fill="#00b44f" opacity="0.45" />
    </g>

    <text
      x="705"
      y="94"
      fill="#02c75a"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-size="92"
      font-weight="900"
      letter-spacing="-4"
    >ab</text>
