<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Laratix Lab LX</title>
  <desc id="desc">Square LX logo mark for Laratix Lab.</desc>
  <defs>
    <linearGradient id="xBlue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17b8e8" />
